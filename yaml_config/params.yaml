  Decision Tree:
    #criterion: ['squared_error', 'friedman_mse', 'absolute_error', 'poisson']
    #splitter: ['best', 'random']
    #max_features: ['sqrt', 'log2']
  
  Random Forest:
    n_estimators: [64, 128, 256]
    max_features: [null, 'sqrt', 'log2']
    max_depth: [5, 10, 15]
    
  Gradient Boosting:
    #loss: ['squared_error', 'huber', 'absolute_error', 'quantile']
    #learning_rate: [0.1, 0.01, 0.05, 0.001]
    #subsample: [0.6, 0.7, 0.75, 0.8, 0.85, 0.9]
    #criterion: ['squared_error', 'friedman_mse']
    #max_features: ['auto', 'sqrt', 'log2']
    #n_estimators: [8, 16, 32, 64, 128, 256]
  
  Linear Regression: {}
  
  XGBRegressor:
    learning_rate: [0.1, 0.01, 0.05]
    n_estimators: [50, 100, 200]
    max_depth: [3, 5, 7]
    subsample: [0.7, 0.8, 0.9]
  
  CatBoosting Regressor:
    iterations: [100, 300, 500]           # Number of trees
    learning_rate: [0.01, 0.05, 0.1]     # Step size (smaller is usually more stable)
    depth: [4, 6, 8, 10]                 # Depth of trees (keep < 10 for speed)
    l2_leaf_reg: [1, 3, 5, 10]           # Regularization to prevent overfitting
    bagging_temperature: [0, 1]          # Bayesian bagging (0 is off, 1 is on)
    border_count: [32, 64, 128]          # Precision for numerical features
    random_strength: [1, 10]             # Amount of randomness for splitting
  
  AdaBoost Regressor:
